name: ProjectBoard CI

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build backend image
        run: docker build -t projectboard-backend ./backend

      - name: Build frontend image
        run: docker build -t projectboard-frontend ./frontend

      - name: Tag backend image
        run: docker tag projectboard-backend ${{ secrets.DOCKER_USERNAME }}/projectboard-backend:latest

      - name: Tag frontend image
        run: docker tag projectboard-frontend ${{ secrets.DOCKER_USERNAME }}/projectboard-frontend:latest

      - name: Push backend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/projectboard-backend:latest

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/projectboard-frontend:latest
