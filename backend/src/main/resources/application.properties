spring.application.name=projectboard

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/projectboard
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

projectboard.jwt.secret=projectboard-dev-secret-change-this-to-a-long-random-value
projectboard.jwt.expiration-minutes=1440
