services:
  db:
    image: postgres:16-alpine
    container_name: projectboard-db
    environment:
      POSTGRES_DB: projectboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d projectboard"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projectboard-backend
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/projectboard
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      PROJECTBOARD_JWT_SECRET: projectboard-dev-secret-change-this-to-a-long-random-value
      PROJECTBOARD_JWT_EXPIRATION_MINUTES: 1440
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: projectboard-frontend
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      REACT_APP_API_URL: http://localhost:8081/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
